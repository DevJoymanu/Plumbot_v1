<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}Plumbot{% endblock %}</title>
    {% include "bot/includes/head_assets.html" %}
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }

        .pb-panel-root {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--color-bg);
        }

        /* Flash messages inside panel */
        .pb-alert-wrap { padding: 8px 12px 0; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="pb-panel-root">
    {% include "bot/includes/messages.html" %}

    {% block content %}{% endblock %}
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
