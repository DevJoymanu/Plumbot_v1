{% extends "bot/layouts/base.html" %}

{% block title %}Mark Lead Inactive{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 760px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">Mark Lead as Inactive</h1>
            <p class="text-muted mb-4">
                This will stop follow-up activity for <strong>{{ appointment.customer_name|default:appointment.phone_number }}</strong>.
            </p>

            <form method="post" class="d-grid gap-3">
                {% csrf_token %}
                <div>
                    <label for="reason" class="form-label">Reason</label>
                    <select id="reason" name="reason" class="form-select">
                        <option value="manual">Manual decision</option>
                        <option value="unresponsive">Unresponsive</option>
                        <option value="not_interested">Not interested</option>
                        <option value="invalid_lead">Invalid lead</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <a href="{% url 'appointment_detail' appointment.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Mark Inactive</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
