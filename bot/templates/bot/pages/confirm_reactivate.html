{% extends "bot/layouts/base.html" %}

{% block title %}Reactivate Lead{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 760px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">Reactivate Lead</h1>
            <p class="text-muted mb-4">
                This will reopen follow-up activity for <strong>{{ appointment.customer_name|default:appointment.phone_number }}</strong>.
            </p>

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <a href="{% url 'appointment_detail' appointment.pk %}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-success">Reactivate</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
