{% extends "bot/layouts/base.html" %}

{% block title %}Test Follow-up{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 760px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-2">Send Test Follow-up</h1>
            <p class="text-muted mb-4">
                Choose a follow-up stage for <strong>{{ appointment.customer_name|default:appointment.phone_number }}</strong>.
            </p>

            <form method="post" class="d-grid gap-3">
                {% csrf_token %}
                <div>
                    <label for="stage" class="form-label">Follow-up stage</label>
                    <select id="stage" name="stage" class="form-select">
                        {% for stage in stages %}
                        <option value="{{ stage }}">{{ stage|title }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <a href="{% url 'appointment_detail' appointment.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Send Test Message</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
