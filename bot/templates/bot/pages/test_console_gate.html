{% extends "bot/layouts/base.html" %}
{% block title %}Test Console — Locked{% endblock %}

{% block extra_css %}
<style>
  .tcg-wrap {
    max-width: 380px; margin: 8vh auto 0; text-align: center;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
    padding: 28px 26px; box-shadow: 0 10px 30px rgba(15,23,42,.06);
  }
  .tcg-icon { font-size: 32px; color: var(--color-teal); margin-bottom: 10px; }
  .tcg-title { font-size: 18px; font-weight: 700; color: #111827; margin: 0 0 4px; }
  .tcg-sub { font-size: 13px; color: #6b7280; margin-bottom: 18px; }
  .tcg-input {
    width: 100%; border: 1px solid #cbd5e1; border-radius: 10px;
    padding: 11px 13px; font-size: 15px; outline: none;
  }
  .tcg-input:focus { border-color: var(--color-teal); }
  .tcg-btn {
    width: 100%; margin-top: 12px; border: none; cursor: pointer;
    background: var(--color-teal); color: #fff; font-weight: 700;
    padding: 11px; border-radius: 10px; font-size: 15px;
  }
  .tcg-error { color: #b91c1c; font-size: 13px; margin-bottom: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="tcg-wrap">
  <div class="tcg-icon"><i class="fas fa-lock"></i></div>
  <h1 class="tcg-title">Test Console</h1>
  <div class="tcg-sub">Enter the password to continue.</div>
  {% if error %}<div class="tcg-error">{{ error }}</div>{% endif %}
  <form method="post" action="{% url 'test_console' %}">
    {% csrf_token %}
    <input type="password" name="console_password" class="tcg-input"
           placeholder="Password" autofocus required>
    <button type="submit" class="tcg-btn">Unlock</button>
  </form>
</div>
{% endblock %}
