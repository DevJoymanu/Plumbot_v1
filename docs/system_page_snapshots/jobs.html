<!DOCTYPE html>
<html lang="en">
<head><base href="http://127.0.0.1:8000/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Plumbot Admin</title>
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
:root {
    --color-header: #0a3d5c;
    --color-header-dark: #072e46;
    --color-teal: #0e7490;
    --color-teal-light: #0891b2;
    --color-green: #25D366;
    --color-green-bg: #DCF8C6;
    --color-green-soft: #dcfce7;
    --color-amber: #f59e0b;
    --color-amber-bg: #fef9c3;
    --color-red: #ef4444;
    --color-red-bg: #fee2e2;
    --color-blue: #2563eb;
    --color-blue-mid: #0ea5e9;
    --color-blue-bg: #dbeafe;
    --color-bg: #f1f5f9;
    --color-surface: #ffffff;
    --color-text: #0f172a;
    --color-text-2: #334155;
    --color-muted: #64748b;
    --color-border: rgba(0, 0, 0, 0.07);
    --color-border-solid: #e2e8f0;
    --font-base: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --nav-width: 224px;
    --bottom-nav-h: 62px;
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-float: 0 8px 28px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body { height: 100%; }

body {
    margin: 0;
    font-family: var(--font-base);
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.011em;
}

a { color: inherit; text-decoration: none; }

/* ── Shell ── */
.pb-shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ── Sidebar ── */
.pb-sidenav {
    width: var(--nav-width);
    background: linear-gradient(170deg, #0d4f73 0%, #072e46 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    box-shadow: 2px 0 20px rgba(0,0,0,0.14);
}

.pb-sidenav__brand {
    padding: 20px 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.09);
}

.pb-sidenav__brand-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    text-decoration: none;
    letter-spacing: -0.02em;
}

.pb-sidenav__brand-name i {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.14);
    border-radius: 10px;
    font-size: 14px;
    flex-shrink: 0;
    transition: background var(--transition);
}

.pb-sidenav__brand-name:hover i {
    background: rgba(255,255,255,0.22);
}

.pb-sidenav__brand-sub {
    margin-top: 5px;
    font-size: 10.5px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    padding-left: 44px;
}

.pb-sidenav__items,
.pb-sidenav__secondary {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 8px;
}

.pb-sidenav__items {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
}
.pb-sidenav__items::-webkit-scrollbar { display: none; }

.pb-sidenav__item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    text-decoration: none;
    color: rgba(255,255,255,0.62);
    font-size: 13px;
    font-weight: 500;
    transition: background var(--transition), color var(--transition);
    position: relative;
    overflow: hidden;
}

.pb-sidenav__item:hover {
    background: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.9);
}

.pb-sidenav__item.active {
    background: rgba(255,255,255,0.14);
    color: #fff;
    font-weight: 600;
}

.pb-sidenav__item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    border-radius: 0 2px 2px 0;
    background: rgba(255,255,255,0.75);
}

.pb-sidenav__item .nav-icon {
    width: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    opacity: 0.8;
    transition: opacity var(--transition);
}

.pb-sidenav__item:hover .nav-icon,
.pb-sidenav__item.active .nav-icon { opacity: 1; }

.pb-badge {
    margin-left: auto;
    min-width: 18px;
    padding: 2px 6px;
    border-radius: 999px;
    background: #22c55e;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
}

/* ── Main content area ── */
.pb-main {
    min-width: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.pb-content {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    background: var(--color-bg);
    background-image: radial-gradient(ellipse at 0% 0%, rgba(14,116,144,0.06) 0%, transparent 50%);
}

.pb-content__inner {
    min-height: 100%;
    animation: pb-fadein 0.22s ease both;
}

@keyframes pb-fadein {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Alerts ── */
.pb-alert-wrap { padding: 14px 16px 0; }

.pb-alert {
    margin-bottom: 8px;
    padding: 10px 16px;
    border-left: 3px solid;
    border-radius: var(--radius-md);
    font-size: 13.5px;
}

.pb-alert--success  { background: #f0fdf4; border-left-color: #22c55e; color: #15803d; }
.pb-alert--error    { background: var(--color-red-bg); border-left-color: var(--color-red); color: #991b1b; }
.pb-alert--warning  { background: var(--color-amber-bg); border-left-color: var(--color-amber); color: #92400e; }
.pb-alert--info     { background: var(--color-blue-bg); border-left-color: var(--color-blue); color: #1d4ed8; }

/* ── Mobile bottom nav ── */
.pb-bottomnav {
    display: none;
    position: fixed;
    inset: auto 0 0 0;
    z-index: 100;
    height: var(--bottom-nav-h);
    background: rgba(255,255,255,0.92);
    border-top: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
}

.pb-bottomnav__items { display: flex; height: 100%; }

.pb-bottomnav__item {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3px;
    text-decoration: none;
    color: #94a3b8;
    font-size: 10px;
    font-weight: 500;
    transition: color var(--transition);
}

.pb-bottomnav__item .nav-icon {
    font-size: 20px;
    transition: transform var(--transition);
}

.pb-bottomnav__item.active {
    color: var(--color-teal);
    font-weight: 700;
}

.pb-bottomnav__item.active .nav-icon { transform: scale(1.1); }

.pb-bottomnav__item.active::before {
    content: "";
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 3px;
    border-radius: 0 0 4px 4px;
    background: var(--color-teal);
}

/* ── Page containers ── */
.pb-page,
.pb-content .container,
.pb-content .container-fluid { padding: 16px; }

/* ── Page topbar / header ── */
.pb-topbar,
.pb-content .header {
    background: linear-gradient(135deg, #0c4a6e 0%, var(--color-header-dark) 100%);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius-xl);
    padding: 18px 20px 16px;
    margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(7,62,92,0.18), 0 1px 4px rgba(0,0,0,0.08);
}

.pb-topbar h1, .pb-topbar h2,
.pb-content .header h1, .pb-content .header h2 {
    margin: 0 0 3px;
    font-size: clamp(1.2rem, 2vw, 1.7rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.025em;
}

.pb-topbar p, .pb-content .header p {
    margin: 0;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
}

/* ── Cards ── */
.pb-content .card,
.pb-card,
.pb-section-card,
.pb-content .filter-card,
.pb-content .status-filter-bar,
.pb-content .delayed-section,
.pb-content .fd-card,
.pb-content .pl-section,
.pb-content .auth-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xs);
}

.pb-content .card,
.pb-content .filter-card,
.pb-content .status-filter-bar { overflow: hidden; }

.pb-content .card-header {
    background: transparent;
    color: var(--color-text);
    border-bottom: 1px solid var(--color-border);
    padding: 14px 16px;
}

.pb-content .card-body { padding: 16px; }

/* ── Dashboard stat tiles ── */
.pb-content .dashboard-grid { display: grid; gap: 14px; }

.pb-content .stat-card,
.pb-content .stat-tile {
    background: linear-gradient(150deg, rgba(14,116,144,0.07) 0%, rgba(14,116,144,0.02) 100%);
    border: 1px solid rgba(14,116,144,0.11);
    box-shadow: var(--shadow-xs);
}

.pb-content .stat-number,
.pb-content .stat-value {
    color: var(--color-header);
    font-variant-numeric: tabular-nums;
}

/* ── Forms ── */
.pb-content label,
.pb-content .form-label,
.pb-content .form-group label {
    display: block;
    margin-bottom: 6px;
    color: var(--color-text-2);
    font-size: 13px;
    font-weight: 600;
}

.pb-content input:not([type="checkbox"]):not([type="radio"]):not([type="hidden"]),
.pb-content select,
.pb-content textarea,
.pb-content .form-control {
    width: 100%;
    min-height: 44px;
    padding: 11px 14px;
    border: 1.5px solid var(--color-border-solid);
    border-radius: var(--radius-md);
    background: #fff;
    color: var(--color-text);
    box-shadow: none;
    font-family: var(--font-base);
    font-size: 14px;
    transition: border-color var(--transition), box-shadow var(--transition);
}

.pb-content input:hover:not(:focus),
.pb-content select:hover:not(:focus),
.pb-content textarea:hover:not(:focus) { border-color: #94a3b8; }

.pb-content input:focus,
.pb-content select:focus,
.pb-content textarea:focus,
.pb-content .form-control:focus {
    outline: none;
    border-color: var(--color-teal);
    box-shadow: 0 0 0 3px rgba(14,116,144,0.12);
}

.pb-content textarea { min-height: 110px; resize: vertical; }

/* ── Buttons ── */
.pb-content .btn,
.pb-content button,
.pb-content input[type="submit"],
.pb-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    border: none;
    border-radius: var(--radius-pill);
    padding: 10px 18px;
    min-height: 42px;
    font-size: 13.5px;
    font-weight: 600;
    font-family: var(--font-base);
    text-decoration: none;
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition), opacity var(--transition);
    letter-spacing: -0.01em;
}

.pb-content .btn:hover,
.pb-content button:hover,
.pb-content input[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
}

.pb-content .btn:active,
.pb-content button:active,
.pb-content input[type="submit"]:active {
    transform: translateY(0) scale(0.98);
    box-shadow: none;
    opacity: 0.88;
}

.pb-content .btn-primary,
.pb-content .btn:not(.btn-secondary):not(.btn-success):not(.btn-danger):not(.btn-warning):not(.btn-outline-primary):not(.btn-outline-secondary):not(.btn-outline-danger):not(.btn-outline-success) {
    background: linear-gradient(135deg, var(--color-teal-light) 0%, var(--color-teal) 100%);
    color: #fff;
    box-shadow: 0 1px 4px rgba(14,116,144,0.22);
}

.pb-content .btn-secondary,
.pb-content .btn-outline-secondary {
    background: #f1f5f9;
    color: var(--color-text-2);
    border: 1px solid var(--color-border-solid);
}

.pb-content .btn-success,
.pb-content .btn-outline-success {
    background: #f0fdf4;
    color: #15803d;
    border: 1px solid rgba(34,197,94,0.22);
}

.pb-content .btn-danger,
.pb-content .btn-outline-danger {
    background: var(--color-red-bg);
    color: #b91c1c;
    border: 1px solid rgba(239,68,68,0.22);
}

.pb-content .btn-warning {
    background: var(--color-amber-bg);
    color: #92400e;
    border: 1px solid rgba(245,158,11,0.22);
}

.pb-content .btn-outline-primary {
    background: var(--color-blue-bg);
    color: #1d4ed8;
    border: 1px solid rgba(59,130,246,0.2);
}

/* ── List rows ── */
.pb-content .appointment-item,
.pb-content .fd-list-row,
.pb-content .pb-followup-row {
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    box-shadow: var(--shadow-xs);
    transition: box-shadow var(--transition), transform var(--transition);
}

.pb-content .appointment-item:hover,
.pb-content .fd-list-row:hover {
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
}

.pb-content .appointment-list,
.pb-content .quotations-list,
.pb-content .jobs-list,
.pb-content .conversation-history { display: grid; gap: 10px; }

.pb-content .appointment-header,
.pb-content .quotation-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}

.pb-content .appointment-name,
.pb-content .lead-info-name,
.pb-content .fd-list-name,
.pb-content .pb-sched-name {
    color: var(--color-text);
    font-size: 15px;
    font-weight: 600;
}

/* ── Status pills ── */
.pb-content .appointment-status,
.pb-content .status-badge,
.pb-content .badge,
.pb-content .pb-status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
}

.pb-content .status-pending,
.pb-content .status-pending_schedule,
.pb-content .pb-pill--pending         { background: #fef9c3; color: #a16207; }

.pb-content .status-confirmed,
.pb-content .status-completed,
.pb-content .status-available,
.pb-content .pb-pill--confirmed       { background: #dcfce7; color: #15803d; }

.pb-content .status-cancelled,
.pb-content .status-unavailable,
.pb-content .pb-pill--cancelled,
.pb-content .pb-pill--job             { background: var(--color-red-bg); color: #991b1b; }

.pb-content .status-scheduled,
.pb-content .status-in_progress,
.pb-content .pb-pill--delayed         { background: var(--color-blue-bg); color: #1e40af; }

/* ── Muted text ── */
.pb-content .appointment-details,
.pb-content .quotation-details { display: grid; gap: 8px; color: var(--color-muted); }

.pb-content .detail-item,
.pb-content .fd-list-meta,
.pb-content .pb-sched-sub,
.pb-content .pb-followup-note { color: var(--color-muted); font-size: 12px; }

/* ── Chat / conversation ── */
.pb-content .conversation-history {
    background: #f8fafc;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: 16px;
}

.pb-content .message {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-xs);
}

.pb-content .message.user {
    margin-left: auto;
    background: var(--color-green-bg);
    border-top-right-radius: 4px;
}

.pb-content .message.assistant {
    margin-right: auto;
    background: #fff;
    border-top-left-radius: 4px;
}

.pb-content .message-header {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 11px;
    font-weight: 600;
}

.pb-content .message.user .message-header      { color: var(--color-header); }
.pb-content .message.assistant .message-header { color: #64748b; }

/* ── Tabs ── */
.pb-content .tabs {
    display: flex;
    gap: 6px;
    border-bottom: none;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
}
.pb-content .tabs::-webkit-scrollbar { display: none; }

.pb-content .tab {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 14px;
    border-radius: 999px;
    background: #f1f5f9;
    color: var(--color-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: background var(--transition), color var(--transition);
}

.pb-content .tab:hover { background: #e2e8f0; color: var(--color-text-2); }
.pb-content .tab.active { background: rgba(14,116,144,0.1); color: var(--color-teal); }

/* ── Tables ── */
.pb-content table, .pb-content .fd-table { width: 100%; border-collapse: collapse; }

.pb-content th, .pb-content td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    text-align: left;
    vertical-align: top;
}

.pb-content th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--color-muted);
    background: #f8fafc;
    font-weight: 600;
}

/* ── Pagination ── */
.pb-content .pagination { display: flex; justify-content: center; gap: 4px; margin-top: 18px; }

.pb-content .page-link {
    min-width: 38px;
    min-height: 38px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border-solid);
    background: #fff;
    color: var(--color-teal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    transition: background var(--transition), border-color var(--transition);
}

.pb-content .page-link:hover { background: #f1f5f9; border-color: #cbd5e1; }

.pb-content .page-item.active .page-link {
    background: var(--color-teal);
    border-color: var(--color-teal);
    color: #fff;
    box-shadow: 0 2px 8px rgba(14,116,144,0.22);
}

/* ── Empty states ── */
.pb-content .empty-state,
.pb-content .fd-empty,
.pb-content .pb-empty-inline {
    padding: 24px 16px;
    text-align: center;
    color: var(--color-muted);
    font-size: 13px;
}

/* ── Collapsible sections ── */
.pb-schedule__body {
    overflow: hidden;
    max-height: 4000px;
    transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.24s ease;
    opacity: 1;
}

.pb-schedule__body.collapsed {
    max-height: 0;
    opacity: 0;
}

/* ── Auth page ── */
.pb-auth-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
        radial-gradient(circle at top left, rgba(37,211,102,0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(14,116,144,0.07), transparent 28%),
        linear-gradient(150deg, #e8f5f1 0%, #f6fbfa 50%, #eef7f3 100%);
}

.pb-auth-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255,255,255,0.97);
    border: 1px solid rgba(7,94,84,0.08);
    border-radius: 24px;
    box-shadow: 0 20px 48px rgba(7,94,84,0.10), 0 4px 12px rgba(0,0,0,0.05);
    padding: 32px 28px;
}

.pb-auth-brand { text-align: center; margin-bottom: 26px; }

.pb-auth-brand__mark {
    width: 72px;
    height: 72px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--color-header), var(--color-teal));
    color: #fff;

    document.addEventListener('DOMContentLoaded', function () {
        // Collapse toggle — CSS handles the max-height animation
        document.querySelectorAll('[data-collapse-toggle]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var targetId = this.getAttribute('data-collapse-toggle');
                var section = document.getElementById(targetId);
                if (section) {
                    section.classList.toggle('collapsed');
                }
            });
        });

        // Mobile input font size (prevents iOS zoom)
        if (window.innerWidth <= 768) {
            document.querySelectorAll('input, select, textarea').forEach(function (input) {
                input.style.fontSize = '16px';
            });
        }

        // Press-scale feedback on interactive rows
        var pressTargets = '.pb-sched-row, .pb-followup-row, .inbox-row, .delayed-row';
        document.querySelectorAll(pressTargets).forEach(function (el) {
            el.addEventListener('pointerdown', function () { this.style.transform = 'scale(0.993)'; }, { passive: true });
            el.addEventListener('pointerup',   function () { this.style.transform = ''; }, { passive: true });
            el.addEventListener('pointerleave',function () { this.style.transform = ''; }, { passive: true });
        });

        // Auto-dismiss flash alerts after 4 s
        document.querySelectorAll('.pb-alert').forEach(function (alert) {
            setTimeout(function () {
                alert.style.transition = 'opacity 0.4s ease, max-height 0.4s ease, padding 0.4s ease';
                alert.style.opacity = '0';
                alert.style.maxHeight = '0';
                alert.style.padding = '0';
                alert.style.marginBottom = '0';
            }, 4000);
        });
    });
</script>
<script>
var PlumbotDates = (function () {
  var TZ = 'Africa/Johannesburg';

  function _parts(date) {
    var result = {};
    new Intl.DateTimeFormat('en-GB', {
      timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(date).forEach(function (part) {
      result[part.type] = part.value;
    });
    return result;
  }

  function sameDay(a, b) {
    var pa = _parts(a), pb = _parts(b);
    return pa.year === pb.year && pa.month === pb.month && pa.day === pb.day;
  }

  function _calDay(date) {
    var p = _parts(date);
    return new Date(parseInt(p.year, 10), parseInt(p.month, 10) - 1, parseInt(p.day, 10));
  }

  function daysDiff(a, b) {
    return Math.round((_calDay(b) - _calDay(a)) / 86400000);
  }

  function hhmm(date) {
    var p = _parts(date);
    return p.hour + ':' + p.minute;
  }

  function _wd(date)    { return date.toLocaleString('en-GB', { timeZone: TZ, weekday: 'short' }); }
  function _day(date)   { return date.toLocaleString('en-GB', { timeZone: TZ, day: 'numeric' }); }
  function _monS(date)  { return date.toLocaleString('en-GB', { timeZone: TZ, month: 'short' }); }
  function _monL(date)  { return date.toLocaleString('en-GB', { timeZone: TZ, month: 'long' }); }

  function formatAppointmentDate(iso) {
    if (!iso) return '';
    var dt = new Date(iso);
    if (isNaN(dt.getTime())) return '';
    var now = new Date();
    var t = hhmm(dt);
    if (sameDay(dt, now)) return 'Today · ' + t;
    if (daysDiff(now, dt) === 1) return 'Tomorrow · ' + t;
    return _wd(dt) + ', ' + _day(dt) + ' ' + _monS(dt) + ' · ' + t;
  }

  function isOverdue(iso, status) {
    if (!iso) return false;
    if (status === 'cancelled' || status === 'completed') return false;
    return new Date(iso).getTime() < Date.now();
  }

  function formatMessageTime(iso) {
    if (!iso) return '';
    var dt = new Date(iso);
    if (isNaN(dt.getTime())) return '';
    var now = new Date();
    var t = hhmm(dt);
    if (sameDay(dt, now)) return t;
    var diff = daysDiff(dt, now);
    if (diff === 1) return 'Yesterday · ' + t;
    if (diff <= 7)  return _wd(dt) + ' · ' + t;
    var p = _parts(dt), pn = _parts(now);
    var dm = _day(dt) + ' ' + _monS(dt);
    if (p.year === pn.year) return dm + ' · ' + t;
    return dm + ' ' + p.year + ' · ' + t;
  }

  function dividerLabel(iso) {
    var dt = new Date(iso);
    var now = new Date();
    if (sameDay(dt, now)) return 'Today';
    if (daysDiff(dt, now) === 1) return 'Yesterday';
    var p = _parts(dt), pn = _parts(now);
    var label = _wd(dt) + ', ' + _day(dt) + ' ' + _monL(dt);
    if (p.year !== pn.year) label += ' ' + p.year;
    return label;
  }

  function initAppointmentDates() {
    document.querySelectorAll('[data-appt-date]').forEach(function (el) {
      var iso = el.dataset.apptDate;
      if (!iso) return;
      var formatted = formatAppointmentDate(iso);
      if (formatted) el.textContent = formatted;
      if (isOverdue(iso, el.dataset.status || '')) el.classList.add('overdue');
    });
  }

  function initChatTimestamps() {
    var scroll = document.getElementById('chatScroll');
    if (!scroll) return;
    scroll.querySelectorAll('.chat-bubble-time[data-ts]').forEach(function (el) {
      var f = formatMessageTime(el.dataset.ts);
      if (f) el.textContent = f;
    });
    var rows = Array.from(scroll.querySelectorAll('.chat-bubble-row[data-ts]'));
    var lastDay = null;
    rows.forEach(function (row) {
      var iso = row.dataset.ts;
      if (!iso) return;
      var dt = new Date(iso);
      if (isNaN(dt.getTime())) return;
      if (!lastDay || !sameDay(dt, lastDay)) {
        var divider = document.createElement('div');
        divider.className = 'chat-date-divider';
        divider.innerHTML = '<span>' + dividerLabel(iso) + '</span>';
        row.parentNode.insertBefore(divider, row);
        lastDay = dt;
      }
    });
  }

  return {
    formatAppointmentDate: formatAppointmentDate,
    formatMessageTime: formatMessageTime,
    dividerLabel: dividerLabel,
    isOverdue: isOverdue,
    sameDay: sameDay,
    initAppointmentDates: initAppointmentDates,
    initChatTimestamps: initChatTimestamps
  };
}());
</script>
