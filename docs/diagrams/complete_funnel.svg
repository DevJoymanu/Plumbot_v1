<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" font-family="Arial" font-size="34" fill="#0f172a" font-weight="700">Complete Booking-to-Review Funnel</text>
  <text x="700" y="88" text-anchor="middle" font-family="Arial" font-size="18" fill="#64748b">Flow diagram generated from the Plumbot CRM funnel</text>
  
  <rect x="110" y="120" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="156" r="22" fill="#0f766e"/>
  <text x="148" y="163" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">1</text>
  <text x="190" y="151" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">WhatsApp enquiry</text>
  <text x="190" y="177" font-size="17" font-family="Arial" fill="#475569">Customer asks about service, price, portfolio, or availability.</text>
  <path d="M700 194 L700 226" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="238" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="274" r="22" fill="#0f766e"/>
  <text x="148" y="281" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">2</text>
  <text x="190" y="269" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">AI qualification</text>
  <text x="190" y="295" font-size="17" font-family="Arial" fill="#475569">Plumbot captures service type, area, timeline, budget, plan status, and contact details.</text>
  <path d="M700 312 L700 344" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="356" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="392" r="22" fill="#0f766e"/>
  <text x="148" y="399" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">3</text>
  <text x="190" y="387" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Lead scoring</text>
  <text x="190" y="413" font-size="17" font-family="Arial" fill="#475569">Hot and very hot leads are prioritized for fast human follow-up.</text>
  <path d="M700 430 L700 462" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="474" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="510" r="22" fill="#0f766e"/>
  <text x="148" y="517" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">4</text>
  <text x="190" y="505" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Booking</text>
  <text x="190" y="531" font-size="17" font-family="Arial" fill="#475569">Valid slot is selected, appointment is confirmed, and Google Calendar is updated.</text>
  <path d="M700 548 L700 580" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="592" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="628" r="22" fill="#0f766e"/>
  <text x="148" y="635" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">5</text>
  <text x="190" y="623" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Reminders</text>
  <text x="190" y="649" font-size="17" font-family="Arial" fill="#475569">Customer and plumber receive timely WhatsApp/email reminders.</text>
  <path d="M700 666 L700 698" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="710" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="746" r="22" fill="#0f766e"/>
  <text x="148" y="753" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">6</text>
  <text x="190" y="741" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Site visit</text>
  <text x="190" y="767" font-size="17" font-family="Arial" fill="#475569">Team completes assessment and records notes.</text>
  <path d="M700 784 L700 816" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="828" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="864" r="22" fill="#0f766e"/>
  <text x="148" y="871" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">7</text>
  <text x="190" y="859" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Quotation</text>
  <text x="190" y="885" font-size="17" font-family="Arial" fill="#475569">Professional PDF quotation is created and sent via WhatsApp.</text>
  <path d="M700 902 L700 934" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="946" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="982" r="22" fill="#0f766e"/>
  <text x="148" y="989" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">8</text>
  <text x="190" y="977" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Job scheduling</text>
  <text x="190" y="1003" font-size="17" font-family="Arial" fill="#475569">Accepted work is scheduled, assigned, and tracked.</text>
  <path d="M700 1020 L700 1052" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="1064" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="1100" r="22" fill="#0f766e"/>
  <text x="148" y="1107" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">9</text>
  <text x="190" y="1095" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Job completion</text>
  <text x="190" y="1121" font-size="17" font-family="Arial" fill="#475569">Status is marked completed with completion notes.</text>
  <path d="M700 1138 L700 1170" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="1182" width="1180" height="72" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <circle cx="148" cy="1218" r="22" fill="#0f766e"/>
  <text x="148" y="1225" text-anchor="middle" font-size="20" font-family="Arial" fill="#ffffff" font-weight="700">10</text>
  <text x="190" y="1213" font-size="22" font-family="Arial" fill="#0f172a" font-weight="700">Google review email</text>
  <text x="190" y="1239" font-size="17" font-family="Arial" fill="#475569">New feature sends a review request while satisfaction is fresh.</text>

</svg>
