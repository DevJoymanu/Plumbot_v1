name: Regression gate

# Runs the deterministic TEST 0 regression suite (the same gate as the local
# pre-commit hook) on every push and pull request. Offline: a mocked DeepSeek is
# used, so no API keys or network are needed. Fails the build on any regression —
# this is the server-side backstop that a local `--no-verify` can't bypass.

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      PLUMBOT_GATE: "1"
      PYTHONIOENCODING: utf-8
      PYTHONPATH: ${{ github.workspace }}
      # Django + the service clients (OpenAI/DeepSeek, Twilio) are constructed at
      # import time and need non-empty creds. These are dummies — the gate never
      # touches the DB and a mocked DeepSeek intercepts every call, so no real
      # network or key is used.
      SECRET_KEY: ci-dummy-secret-key
      DATABASE_URL: sqlite:///db.sqlite3
      DEEPSEEK_API_KEY: ci-dummy-deepseek-key
      OPENAI_API_KEY: ci-dummy-openai-key
      TWILIO_ACCOUNT_SID: ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      TWILIO_AUTH_TOKEN: ci-dummy-twilio-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TEST 0 gate
        run: python tests/test_bot_responses.py
